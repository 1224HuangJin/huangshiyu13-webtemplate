<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>打字机</title>
<script>
function text(str){
   var arr=[];
   var text=document.getElementsByClassName("text")[0];
   for(var i=0;i<str.length;i++){arr[i]=str[i];}
   var p=document.createElement("p");
   text.appendChild(p);
   var index=0;
   var obj=setInterval(function(){
	   if(index<arr.length){
	   var text=document.createTextNode(arr[index]);
	   }
	   p.appendChild(text);
	   index++;
	   },200);

}
window.onload=function(){
  text("这里的文字，正因你而跳动<br>光标在深邃的黑夜里闪烁，那是数字世界的脉搏。<br>你现在看到的每一个字符，都曾是一段静止的代码，直到你的目光触及，它们才被赋予了“存在”的意义。我们总是在追求永恒，但真正的美，往往存在于按下回车键前那零点几秒的迟疑。<br>关于创造的碎碎念<br>灵感：不是抓取，而是邂逅。^<br>代码：是逻辑的诗，是理性与浪漫的握手言和。<br>交互：当你看着屏幕时，屏幕也在观察这个世界的温度。<br>“在 0 与 1 的缝隙里，藏着人类所有的感性。”<br>在这个快进的时代，慢下来看一段文字逐个蹦出，本身就是一种数字时代的禅意。不必急着读完，因为此时此刻，过程本身就是目的。");
}
</script>
<style>
.text{ width: 1000px; height: 600px; background-color: #ECECEC; margin: 100px auto; padding: 20px; }
</style>
</head>
<body>

<div class="text">



</div>





</body>
</html>
