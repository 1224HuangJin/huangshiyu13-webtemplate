<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTemplate 导航枢纽</title>
    <style>
        :root {
            --accent: #00d2ff;
            --bg-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 40px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }

        /* 搜索框毛玻璃 */
        .controls {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin-bottom: 40px;
        }
        #searchBar {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            font-size: 1.1rem;
            outline: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        #searchBar::placeholder { color: rgba(255,255,255,0.7); }
        #searchBar:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent);
        }

        /* 网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            padding: 25px;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }
        .card:hover::before { transform: translateX(100%); }
        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .card h3 {
            margin: 0;
            font-size: 1.2rem;
            word-break: break-all;
            line-height: 1.4;
        }
        .card .btn {
            margin-top: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: bold;
        }

        /* 加载动画 */
        .loader {
            text-align: center;
            font-size: 1.5rem;
            padding: 50px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Web Template Hub</h1>
        <p id="stat">正在扫描仓库中的模板...</p>
    </header>

    <div class="controls">
        <input type="text" id="searchBar" placeholder="🔍 搜索文件夹名称..." onkeyup="filter()">
    </div>

    <div id="loader" class="loader">📡 正在调取 GitHub 目录...</div>
    <div class="grid" id="grid"></div>
</div>

<script>
    // 【重要：请修改这里】
    const CONFIG = {
        username: '1224HuangJin', // 你的GitHub用户名
        repo: 'huangshiyu13-webtemplate' // 你的仓库名
    };

    async function fetchTemplates() {
        const grid = document.getElementById('grid');
        const loader = document.getElementById('loader');
        const stat = document.getElementById('stat');

        try {
            // 使用 GitHub API 获取根目录文件列表
            const response = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/`);
            const data = await response.json();

            // 只保留文件夹 (type == 'dir')，并排除掉隐藏文件夹
            const folders = data.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

            loader.style.display = 'none';
            stat.innerText = `已发现 ${folders.length} 个模板目录`;

            folders.forEach(folder => {
                const card = document.createElement('a');
                card.className = 'card';
                // 链接到文件夹路径
                card.href = `./${folder.name}/`;
                card.innerHTML = `
                    <h3>${folder.name}</h3>
                    <div class="btn">立即预览 →</div>
                `;
                grid.appendChild(card);
            });
        } catch (error) {
            loader.innerText = '❌ 加载失败，请检查网络或配置。';
            console.error(error);
        }
    }

    function filter() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const title = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = title.includes(query) ? 'flex' : 'none';
        });
    }

    fetchTemplates();
</script>

</body>
</html>
